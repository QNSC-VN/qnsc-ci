# =============================================================================
# Reusable: OpenTofu plan for changed workspaces, posted back to the PR.
#
# Read-only (assumes <product>-github-infra-plan). Detects which infra/live/*
# dirs changed in the PR and plans each in a matrix, commenting the diff. Mirrors
# the apply TF_VARs so plan ≈ apply (avoids the "plan passed fewer vars" drift).
# =============================================================================
name: Reusable OpenTofu Plan

on:
  workflow_call:
    inputs:
      product:      { required: true, type: string }
      live_prefix:  { type: string, default: "infra/live/" }
      aws_region:   { type: string, default: "ap-southeast-1" }
      tofu_version: { type: string, default: "1.9.1" }
      tf_vars_json: { type: string, default: "{}" }
    secrets:
      AWS_ACCOUNT_ID:      { required: true }
      tf_secret_vars_json: { required: false }

permissions:
  id-token: write
  contents: read
  pull-requests: write

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      workspaces: ${{ steps.set.outputs.workspaces }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with: { fetch-depth: 0 }
      - id: set
        env:
          PREFIX: ${{ inputs.live_prefix }}
        run: |
          CHANGED=$(git diff --name-only "origin/${{ github.base_ref }}...HEAD" \
            | grep "^${PREFIX}" \
            | cut -d/ -f1-3 \
            | sort -u \
            | jq -Rc 'select(length>0)' \
            | jq -sc '.')
          echo "workspaces=${CHANGED:-[]}" >> "$GITHUB_OUTPUT"

  plan:
    needs: detect-changes
    if: ${{ needs.detect-changes.outputs.workspaces != '[]' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        workspace: ${{ fromJson(needs.detect-changes.outputs.workspaces) }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - uses: QNSC-VN/qnsc-ci/actions/setup-tofu-aws@v1
        with:
          role-arn:     arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/${{ inputs.product }}-github-infra-plan
          aws-region:   ${{ inputs.aws_region }}
          tofu-version: ${{ inputs.tofu_version }}

      - name: Export non-secret TF_VARs
        env:
          VARS_JSON: ${{ inputs.tf_vars_json }}
        run: echo "$VARS_JSON" | jq -r 'to_entries[] | "TF_VAR_\(.key)=\(.value)"' >> "$GITHUB_ENV"

      - name: Export secret TF_VARs (masked)
        if: ${{ secrets.tf_secret_vars_json != '' }}
        env:
          SECRETS_JSON: ${{ secrets.tf_secret_vars_json }}
        run: |
          echo "$SECRETS_JSON" | jq -r '.[]' | while IFS= read -r v; do echo "::add-mask::$v"; done
          echo "$SECRETS_JSON" | jq -r 'to_entries[] | "TF_VAR_\(.key)=\(.value)"' >> "$GITHUB_ENV"

      - name: tofu init
        working-directory: ${{ matrix.workspace }}
        run: tofu init -input=false

      - name: tofu validate
        working-directory: ${{ matrix.workspace }}
        run: tofu validate

      - name: tofu plan
        id: plan
        working-directory: ${{ matrix.workspace }}
        run: |
          set +e
          tofu plan -input=false -no-color -detailed-exitcode -out=tfplan 2>&1 | tee plan.txt
          echo "exitcode=${PIPESTATUS[0]}" >> "$GITHUB_OUTPUT"

      - name: Post plan to PR
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea  # v7.0.1
        if: always()
        with:
          script: |
            const fs = require('fs');
            const ws = '${{ matrix.workspace }}';
            const plan = fs.readFileSync(`${ws}/plan.txt`, 'utf8');
            const MAX = 65000;
            const body = `### OpenTofu Plan — \`${ws}\`\n\`\`\`hcl\n${plan.length > MAX ? plan.slice(0, MAX) + '\n... (truncated)' : plan}\n\`\`\``;
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body,
            });

      - name: Fail if plan errored
        if: steps.plan.outputs.exitcode != '0' && steps.plan.outputs.exitcode != '2'
        run: exit 1
