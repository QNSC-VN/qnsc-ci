# =============================================================================
# Reusable: OpenTofu apply for ONE workspace, inside a gated GitHub Environment.
#
# Callers compose the stages + gating (shared always; develop on branch; prod on
# tag) and delegate the tofu mechanics here. Centralizes checkout→setup→init→
# apply so every product runs identical, audited steps. See the reference caller
# in qnsc-infra-template/.github/workflows/infra-apply.yml.
#
# TF_VARs: non-secret via `tf_vars_json` input, secret via `tf_secret_vars_json`
# secret (masked). Both are JSON objects: {"acm_cert_arn":"…"} → TF_VAR_acm_cert_arn.
# =============================================================================
name: Reusable OpenTofu Apply

on:
  workflow_call:
    inputs:
      workspace:    { required: true, type: string }   # e.g. infra/live/develop
      environment:  { required: true, type: string }   # GitHub Environment (gate) — shared/develop/production
      product:      { required: true, type: string }   # role prefix → <product>-github-infra-apply
      aws_region:   { type: string, default: "ap-southeast-1" }
      tofu_version: { type: string, default: "1.9.1" }
      tf_vars_json: { type: string, default: "{}" }     # non-secret TF_VAR_* as JSON
    secrets:
      AWS_ACCOUNT_ID:      { required: true }
      tf_secret_vars_json: { required: false }          # secret TF_VAR_* as JSON

permissions:
  id-token: write
  contents: read

jobs:
  apply:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - uses: QNSC-VN/qnsc-ci/actions/setup-tofu-aws@v1
        with:
          role-arn:     arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/${{ inputs.product }}-github-infra-apply
          aws-region:   ${{ inputs.aws_region }}
          tofu-version: ${{ inputs.tofu_version }}

      - name: Export non-secret TF_VARs
        env:
          VARS_JSON: ${{ inputs.tf_vars_json }}
        run: echo "$VARS_JSON" | jq -r 'to_entries[] | "TF_VAR_\(.key)=\(.value)"' >> "$GITHUB_ENV"

      - name: Export secret TF_VARs (masked)
        if: ${{ secrets.tf_secret_vars_json != '' }}
        env:
          SECRETS_JSON: ${{ secrets.tf_secret_vars_json }}
        run: |
          echo "$SECRETS_JSON" | jq -r '.[]' | while IFS= read -r v; do echo "::add-mask::$v"; done
          echo "$SECRETS_JSON" | jq -r 'to_entries[] | "TF_VAR_\(.key)=\(.value)"' >> "$GITHUB_ENV"

      - name: tofu init
        working-directory: ${{ inputs.workspace }}
        run: tofu init -input=false

      - name: tofu validate
        working-directory: ${{ inputs.workspace }}
        run: tofu validate

      - name: tofu apply
        working-directory: ${{ inputs.workspace }}
        run: tofu apply -input=false -auto-approve
