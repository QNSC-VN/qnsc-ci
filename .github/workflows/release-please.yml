# =============================================================================
# Reusable Release Please — auto-creates a "chore(release): vX.Y.Z" PR on
# every main push, then auto-tags when that PR is merged. The tag triggers
# the product's prod deploy (approval-gated).
#
# Caller:
#   jobs:
#     release:
#       uses: QNSC-VN/qnsc-ci/.github/workflows/release-please.yml@v1
#       secrets:
#         RELEASE_BOT_PRIVATE_KEY: ${{ secrets.RELEASE_BOT_PRIVATE_KEY }}
#
# RELEASE_BOT_APP_ID (org/repo variable) is read automatically from the
# caller's context. RELEASE_BOT_PRIVATE_KEY is passed explicitly (least
# privilege — no `secrets: inherit`). Both are optional: the workflow falls
# back to github.token when unset. The release-please config file stays
# product-local (default path below).
# =============================================================================
name: Reusable Release Please

on:
  workflow_call:
    inputs:
      config_file:
        description: Path to the release-please config, relative to the caller repo root.
        required: false
        default: release-please-config.json
        type: string
      manifest_file:
        description: Optional path to the release-please manifest file.
        required: false
        default: ''
        type: string
    secrets:
      RELEASE_BOT_PRIVATE_KEY:
        description: >-
          Private key for the release-bot GitHub App. Lets Release Please push
          tags that trigger downstream deploys. Optional — falls back to
          github.token when omitted.
        required: false

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    name: Release Please
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      # A GitHub App token lets Release Please open PRs and push tags that
      # trigger downstream workflows (the default GITHUB_TOKEN cannot trigger
      # other workflows). Falls back to github.token if the app is not set up.
      - uses: actions/create-github-app-token@fee1f7d63c2ff003460e3d139729b119787bc349  # v2.2.2
        id: app-token
        continue-on-error: true
        with:
          app-id: ${{ vars.RELEASE_BOT_APP_ID }}
          private-key: ${{ secrets.RELEASE_BOT_PRIVATE_KEY }}

      - uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7  # v5.0.0
        with:
          token: ${{ steps.app-token.outputs.token || github.token }}
          config-file: ${{ inputs.config_file }}
          manifest-file: ${{ inputs.manifest_file }}
