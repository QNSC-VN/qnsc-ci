# =============================================================================
# Reusable: web (SPA) deploy — build the Vite/Astro bundle, publish to
# Cloudflare Pages. One workflow for every QNSC frontend.
#
# Two deploy shapes, selected by `single_environment`:
#   • DUAL  (default, single_environment='') — 2-env products (rally, opshub):
#       main push → develop (auto),  v*.*.* tag → production (env-gated).
#   • SINGLE (single_environment='production') — 1-env apps (landing, ceo-suite):
#       main push → that one environment. No tag/promotion — deploy on merge.
#       Add a required reviewer on the GitHub Environment to gate the deploy.
#
# Package manager, build command, dist path and optional D1 migrations are all
# inputs, so the same reusable serves pnpm monorepos and standalone npm apps.
# VITE_*/PAGES_PROJECT/APP_URL stay env-scoped GitHub vars (caller: secrets: inherit).
#
# Data-app safety knobs (all opt-in, default off — no effect on static sites):
#   • backup_before_migrate — export D1 to a restore point BEFORE migrating
#       (90-day artifact always; + R2 archive when d1_backup_bucket is set).
#       Blocking: no backup ⇒ no migrate.
#   • require_health_check   — refuse to deploy if APP_URL is unset (a data app
#       must be verifiable post-deploy, not shipped blind).
#   • wrangler_version       — pinned wrangler for reproducible D1 export/migrate
#       (never floating `npx wrangler` latest).
# Migrations are forward-only and NOT atomic with the publish — keep them
# backward-compatible (expand/contract).
#
# `working_directory` is the CWD for the wrangler deploy. It defaults to the repo
# root, which suits standalone apps. Monorepos whose web app lives in a subdir
# (e.g. rally: apps/web) must set it so wrangler discovers that package's
# file-based Pages Functions (the `functions/` dir is resolved relative to the
# wrangler CWD). `web_dist_path` is then relative to `working_directory`.
# =============================================================================
name: Reusable · Web Deploy

on:
  workflow_call:
    inputs:
      product:            { required: true, type: string }
      package_manager:    { type: string, default: "pnpm" }        # pnpm | npm
      web_package:        { type: string, default: "" }            # pnpm filter; defaults to <product>-web
      build_command:      { type: string, default: "" }            # overrides derived build; e.g. "npm run build"
      web_dist_path:      { type: string, default: "apps/web/dist" }  # relative to working_directory
      working_directory:  { type: string, default: "." }            # wrangler CWD; set to the web pkg dir (e.g. apps/web) so file-based Pages Functions resolve
      single_environment: { type: string, default: "" }            # set (e.g. production) for 1-env apps
      run_d1_migrations:  { type: boolean, default: false }        # apply D1 migrations before deploy
      d1_database:        { type: string, default: "" }            # D1 database name (with run_d1_migrations)
      backup_before_migrate: { type: boolean, default: false }     # export D1 to a restore point BEFORE migrating (data apps)
      d1_backup_bucket:   { type: string, default: "" }            # R2 bucket for durable backup archive; empty = GitHub artifact only
      require_health_check:  { type: boolean, default: false }     # fail the deploy if APP_URL is unset (no post-deploy verification possible)
      wrangler_version:   { type: string, default: "4.107.0" }     # pin wrangler for reproducible D1 export/migrate (never floating latest)
      node_version:       { type: string, default: "22" }
      pnpm_version:       { type: string, default: "10.33.2" }
    secrets:
      CLOUDFLARE_API_TOKEN:  { required: true }
      CLOUDFLARE_ACCOUNT_ID: { required: true }
      SLACK_DEPLOY_WEBHOOK:  { required: false }

# Safe-by-default at the shared layer (callers also set their own group). Never
# cancel a running web deploy — a half-applied Pages publish / D1 migration is
# worse than a queued one.
concurrency:
  group: web-deploy-${{ github.repository }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  context:
    name: Resolve context
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      environment: ${{ steps.ctx.outputs.environment }}
      asset_tag:   ${{ steps.ctx.outputs.asset_tag }}
    steps:
      - id: ctx
        env:
          SINGLE_ENV: ${{ inputs.single_environment }}
        run: |
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            ASSET_TAG="${{ github.ref_name }}"
          else
            ASSET_TAG="sha-${{ github.sha }}"
          fi
          echo "asset_tag=$ASSET_TAG" >> "$GITHUB_OUTPUT"
          if [[ -n "$SINGLE_ENV" ]]; then
            # 1-env app — always the one environment, regardless of trigger.
            echo "environment=$SINGLE_ENV" >> "$GITHUB_OUTPUT"
          elif [[ "${{ github.ref_type }}" == "tag" ]]; then
            echo "environment=production" >> "$GITHUB_OUTPUT"
          else
            echo "environment=develop" >> "$GITHUB_OUTPUT"
          fi

  deploy:
    name: Deploy to ${{ needs.context.outputs.environment }}
    runs-on: ubuntu-latest
    needs: context
    environment: ${{ needs.context.outputs.environment }}
    timeout-minutes: 20
    permissions:
      contents: read
      packages: read   # pull private @scope/* deps from GitHub Packages during pnpm install
    env:
      ASSET_TAG:   ${{ needs.context.outputs.asset_tag }}
      ENVIRONMENT: ${{ needs.context.outputs.environment }}
      WEB_PACKAGE: ${{ inputs.web_package != '' && inputs.web_package || format('{0}-web', inputs.product) }}
      # pnpm installs the whole workspace at the repo root; monorepos whose
      # backend depends on private @scope/* packages need this to authenticate
      # the GitHub Packages registry (.npmrc reads ${NODE_AUTH_TOKEN}).
      NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      # ── Pre-flight — fail fast BEFORE build/migrate/publish ────────────────
      # A data app that requires post-deploy verification must have somewhere to
      # verify. Catch a missing APP_URL up front rather than silently shipping
      # unverified (the health-check step below is skipped when APP_URL is empty).
      - name: Pre-flight — required config
        if: inputs.require_health_check && vars.APP_URL == ''
        run: |
          echo "::error ::require_health_check=true but the APP_URL env var is unset for '${{ needs.context.outputs.environment }}'. Set it so the post-deploy health check can run; refusing to deploy unverified." >&2
          exit 1

      # ── Install (pnpm — org default) ────────────────────────────────────────
      - name: Install dependencies (pnpm)
        if: inputs.package_manager == 'pnpm'
        uses: QNSC-VN/qnsc-ci/actions/setup-node-pnpm@v1
        with:
          node-version: ${{ inputs.node_version }}
          pnpm-version: ${{ inputs.pnpm_version }}

      # ── Install (npm — standalone apps like ceo-suite) ─────────────────────
      - name: Setup Node (npm)
        if: inputs.package_manager == 'npm'
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020  # v7.0.0
        with:
          node-version: ${{ inputs.node_version }}
          cache: npm
      - name: Install dependencies (npm)
        if: inputs.package_manager == 'npm'
        run: npm ci

      # ── Build — VITE_* baked in at build time (env-scoped) ─────────────────
      - name: Build
        env:
          VITE_API_URL:         ${{ vars.VITE_API_URL }}
          VITE_APP_ENV:         ${{ vars.VITE_APP_ENV }}
          BUILD_COMMAND:  ${{ inputs.build_command }}
          PACKAGE_MANAGER: ${{ inputs.package_manager }}
        run: |
          set -euo pipefail
          # build_command wins (standalone/single-package apps pass e.g. "pnpm build"
          # or "npm run build"); otherwise derive: npm → npm run build; pnpm monorepo
          # → filter the <product>-web workspace package.
          if [ -n "$BUILD_COMMAND" ]; then
            eval "$BUILD_COMMAND"
          elif [ "$PACKAGE_MANAGER" = "npm" ]; then
            npm run build
          else
            pnpm --filter "$WEB_PACKAGE" build
          fi

      # ── D1 backup — capture a restore point BEFORE any schema change ───────
      # Migrations against --remote are irreversible; a data app must have a
      # pre-migration export to roll back to. The export always lands as a
      # 90-day GitHub artifact (works with zero extra infra); when a durable R2
      # bucket is provided it is also archived there. Blocking on purpose: no
      # backup ⇒ no migrate. wrangler is version-pinned for reproducibility.
      - name: Export D1 (pre-migration backup)
        if: inputs.run_d1_migrations && inputs.backup_before_migrate
        working-directory: ${{ inputs.working_directory }}
        env:
          CLOUDFLARE_API_TOKEN:  ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set -euo pipefail
          FILE="d1-backup-${{ inputs.d1_database }}-${ASSET_TAG//\//-}.sql"
          echo "D1_BACKUP_FILE=$FILE" >> "$GITHUB_ENV"
          npx --yes wrangler@${{ inputs.wrangler_version }} d1 export "${{ inputs.d1_database }}" --remote --output "$FILE"
          test -s "$FILE" || { echo "::error ::D1 export produced an empty file — aborting before migrate." >&2; exit 1; }
          echo "Exported ${{ inputs.d1_database }} → $FILE ($(wc -c <"$FILE") bytes)"

      - name: Upload D1 backup (artifact)
        if: inputs.run_d1_migrations && inputs.backup_before_migrate
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.2
        with:
          name: d1-backup-${{ inputs.product }}-${{ needs.context.outputs.asset_tag }}
          path: ${{ inputs.working_directory }}/${{ env.D1_BACKUP_FILE }}
          retention-days: 90
          if-no-files-found: error

      - name: Archive D1 backup to R2
        if: inputs.run_d1_migrations && inputs.backup_before_migrate && inputs.d1_backup_bucket != ''
        working-directory: ${{ inputs.working_directory }}
        env:
          CLOUDFLARE_API_TOKEN:  ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set -euo pipefail
          KEY="${{ inputs.product }}/${{ env.ENVIRONMENT }}/${{ env.D1_BACKUP_FILE }}"
          npx --yes wrangler@${{ inputs.wrangler_version }} r2 object put "${{ inputs.d1_backup_bucket }}/${KEY}" --file "${{ env.D1_BACKUP_FILE }}" --remote
          echo "Archived backup → r2://${{ inputs.d1_backup_bucket }}/${KEY}"

      # ── D1 migrations (data apps) — applied before the new code is live ────
      # Forward-only + not atomic with the publish below: migrations MUST be
      # backward-compatible (expand/contract) so old code keeps working if the
      # publish step fails after this succeeds.
      - name: Apply D1 migrations
        if: inputs.run_d1_migrations
        working-directory: ${{ inputs.working_directory }}
        env:
          CLOUDFLARE_API_TOKEN:  ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx --yes wrangler@${{ inputs.wrangler_version }} d1 migrations apply "${{ inputs.d1_database }}" --remote

      # ── Publish to Cloudflare Pages ────────────────────────────────────────
      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@ebbaa1584979971c8614a24965b4405ff95890e0  # v4.0.0
        with:
          apiToken:  ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: ${{ inputs.working_directory }}
          command: >-
            pages deploy ${{ inputs.web_dist_path }}
            --project-name=${{ vars.PAGES_PROJECT }}
            --branch=main

      - name: Post-deploy health check
        if: vars.APP_URL != ''
        uses: QNSC-VN/qnsc-ci/actions/post-deploy-health-check@v1
        with:
          url: ${{ vars.APP_URL }}
          expected-status: '200'
          timeout-seconds: '60'

      - name: Deployment summary
        if: always()
        run: |
          STATUS="${{ job.status }}"
          echo "### Deploy $STATUS — $ENVIRONMENT" >> "$GITHUB_STEP_SUMMARY"
          echo "| Field | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-------|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Asset tag** | \`$ASSET_TAG\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Pages project** | \`${{ vars.PAGES_PROJECT }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Actor** | ${{ github.actor }} |" >> "$GITHUB_STEP_SUMMARY"

      - name: Notify deploy result
        if: always()
        uses: QNSC-VN/qnsc-ci/actions/notify-deploy@v1
        with:
          webhook-url: ${{ secrets.SLACK_DEPLOY_WEBHOOK }}
          status: ${{ job.status == 'success' && 'success' || 'failure' }}
          service: ${{ inputs.product }}-web
          environment: ${{ env.ENVIRONMENT }}
          version: ${{ env.ASSET_TAG }}
