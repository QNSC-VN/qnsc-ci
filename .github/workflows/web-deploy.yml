# =============================================================================
# Reusable: web (SPA) deploy — build Vite bundle, sync to S3, invalidate
# CloudFront. Tag-gated prod org-wide: main→develop, v*.*.* tag→production.
#
# VITE_* build vars + S3_BUCKET/CLOUDFRONT_ID/APP_URL are env-scoped GitHub vars,
# resolved from the job's `environment:` (caller passes `secrets: inherit`).
# =============================================================================
name: Reusable Web Deploy

on:
  workflow_call:
    inputs:
      product:       { required: true, type: string }
      web_package:   { type: string, default: "" }          # pnpm filter; defaults to <product>-web
      web_dist_path: { type: string, default: "apps/web/dist" }
      node_version:  { type: string, default: "22" }
      pnpm_version:  { type: string, default: "10.33.2" }
      aws_region:    { type: string, default: "ap-southeast-1" }
    secrets:
      AWS_ACCOUNT_ID:       { required: true }
      SLACK_DEPLOY_WEBHOOK: { required: false }

permissions:
  contents: read

jobs:
  context:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      environment: ${{ steps.ctx.outputs.environment }}
      asset_tag:   ${{ steps.ctx.outputs.asset_tag }}
    steps:
      - id: ctx
        run: |
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            echo "environment=production" >> "$GITHUB_OUTPUT"
            echo "asset_tag=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          else
            echo "environment=develop" >> "$GITHUB_OUTPUT"
            echo "asset_tag=sha-${{ github.sha }}" >> "$GITHUB_OUTPUT"
          fi

  deploy:
    name: Deploy to ${{ needs.context.outputs.environment }}
    runs-on: ubuntu-latest
    needs: context
    environment: ${{ needs.context.outputs.environment }}
    timeout-minutes: 20
    permissions:
      id-token: write
      contents: read
    env:
      ASSET_TAG:   ${{ needs.context.outputs.asset_tag }}
      ENVIRONMENT: ${{ needs.context.outputs.environment }}
      WEB_PACKAGE: ${{ inputs.web_package != '' && inputs.web_package || format('{0}-web', inputs.product) }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Install dependencies
        uses: QNSC-VN/qnsc-ci/actions/setup-node-pnpm@v1
        with:
          node-version: ${{ inputs.node_version }}
          pnpm-version: ${{ inputs.pnpm_version }}

      - name: Build
        run: pnpm --filter "$WEB_PACKAGE" build
        env:
          VITE_API_URL:         ${{ vars.VITE_API_URL }}
          VITE_APP_ENV:         ${{ vars.VITE_APP_ENV }}
          VITE_ENTRA_TENANT_ID: ${{ vars.VITE_ENTRA_TENANT_ID }}
          VITE_ENTRA_CLIENT_ID: ${{ vars.VITE_ENTRA_CLIENT_ID }}

      - name: Setup AWS OIDC
        uses: QNSC-VN/qnsc-ci/actions/setup-aws-oidc@v1
        with:
          role-arn: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/${{ inputs.product }}-github-web-deploy-${{ env.ENVIRONMENT }}
          region: ${{ inputs.aws_region }}

      - name: Sync dist to S3
        run: |
          aws s3 sync "${{ inputs.web_dist_path }}/" "s3://${{ vars.S3_BUCKET }}/" \
            --delete --exclude "index.html" \
            --cache-control "public, max-age=31536000, immutable" \
            --region "${{ inputs.aws_region }}"
          aws s3 cp "${{ inputs.web_dist_path }}/index.html" "s3://${{ vars.S3_BUCKET }}/index.html" \
            --cache-control "no-cache, no-store, must-revalidate" \
            --content-type "text/html" \
            --region "${{ inputs.aws_region }}"

      - name: Invalidate CloudFront cache
        uses: QNSC-VN/qnsc-ci/actions/cloudfront-invalidate@v1
        with:
          distribution-id: ${{ vars.CLOUDFRONT_ID }}
          region: us-east-1
          wait: 'true'

      - name: Post-deploy health check
        if: vars.APP_URL != ''
        uses: QNSC-VN/qnsc-ci/actions/post-deploy-health-check@v1
        with:
          url: ${{ vars.APP_URL }}
          expected-status: '200'
          timeout-seconds: '60'

      - name: Notify deploy result
        if: always()
        uses: QNSC-VN/qnsc-ci/actions/notify-deploy@v1
        with:
          webhook-url: ${{ secrets.SLACK_DEPLOY_WEBHOOK }}
          status: ${{ job.status == 'success' && 'success' || 'failure' }}
          service: ${{ inputs.product }}-web
          environment: ${{ env.ENVIRONMENT }}
          version: ${{ env.ASSET_TAG }}
