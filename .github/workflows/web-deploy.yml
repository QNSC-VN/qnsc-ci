# =============================================================================
# Reusable: web (SPA) deploy — build the Vite bundle, publish to Cloudflare
# Pages. Tag-gated prod org-wide: main→develop, v*.*.* tag→production.
#
# Cloudflare Pages = zero-egress static hosting with native SPA routing and
# managed TLS on the custom domain. VITE_* build vars + PAGES_PROJECT/APP_URL
# are env-scoped GitHub vars, resolved from the job's `environment:` (the caller
# passes `secrets: inherit`). See the reference caller in the product repos.
# =============================================================================
name: Reusable · Web Deploy

on:
  workflow_call:
    inputs:
      product:       { required: true, type: string }
      web_package:   { type: string, default: "" }          # pnpm filter; defaults to <product>-web
      web_dist_path: { type: string, default: "apps/web/dist" }
      node_version:  { type: string, default: "22" }
      pnpm_version:  { type: string, default: "10.33.2" }
    secrets:
      CLOUDFLARE_API_TOKEN:  { required: true }
      CLOUDFLARE_ACCOUNT_ID: { required: true }
      SLACK_DEPLOY_WEBHOOK:  { required: false }

permissions:
  contents: read

jobs:
  context:
    name: Resolve context
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      environment: ${{ steps.ctx.outputs.environment }}
      asset_tag:   ${{ steps.ctx.outputs.asset_tag }}
    steps:
      - id: ctx
        run: |
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            echo "environment=production" >> "$GITHUB_OUTPUT"
            echo "asset_tag=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          else
            echo "environment=develop" >> "$GITHUB_OUTPUT"
            echo "asset_tag=sha-${{ github.sha }}" >> "$GITHUB_OUTPUT"
          fi

  deploy:
    name: Deploy to ${{ needs.context.outputs.environment }}
    runs-on: ubuntu-latest
    needs: context
    environment: ${{ needs.context.outputs.environment }}
    timeout-minutes: 20
    permissions:
      contents: read
    env:
      ASSET_TAG:   ${{ needs.context.outputs.asset_tag }}
      ENVIRONMENT: ${{ needs.context.outputs.environment }}
      WEB_PACKAGE: ${{ inputs.web_package != '' && inputs.web_package || format('{0}-web', inputs.product) }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Install dependencies
        uses: QNSC-VN/qnsc-ci/actions/setup-node-pnpm@v1
        with:
          node-version: ${{ inputs.node_version }}
          pnpm-version: ${{ inputs.pnpm_version }}

      # All VITE_* vars are baked into the bundle at build time (env-scoped).
      - name: Build
        run: pnpm --filter "$WEB_PACKAGE" build
        env:
          VITE_API_URL:         ${{ vars.VITE_API_URL }}
          VITE_APP_ENV:         ${{ vars.VITE_APP_ENV }}
          VITE_ENTRA_TENANT_ID: ${{ vars.VITE_ENTRA_TENANT_ID }}
          VITE_ENTRA_CLIENT_ID: ${{ vars.VITE_ENTRA_CLIENT_ID }}

      # wrangler uploads the pre-built dist as a Pages deployment; --branch main
      # marks it the production deployment for the project.
      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@9acf94ace14e7dc412b076f2c5c20b8ce93c79cd  # v3
        with:
          apiToken:  ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: >-
            pages deploy ${{ inputs.web_dist_path }}
            --project-name=${{ vars.PAGES_PROJECT }}
            --branch=main

      - name: Post-deploy health check
        if: vars.APP_URL != ''
        uses: QNSC-VN/qnsc-ci/actions/post-deploy-health-check@v1
        with:
          url: ${{ vars.APP_URL }}
          expected-status: '200'
          timeout-seconds: '60'

      - name: Deployment summary
        if: always()
        run: |
          STATUS="${{ job.status }}"
          echo "### Deploy $STATUS — $ENVIRONMENT" >> "$GITHUB_STEP_SUMMARY"
          echo "| Field | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-------|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Asset tag** | \`$ASSET_TAG\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Pages project** | \`${{ vars.PAGES_PROJECT }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Actor** | ${{ github.actor }} |" >> "$GITHUB_STEP_SUMMARY"

      - name: Notify deploy result
        if: always()
        uses: QNSC-VN/qnsc-ci/actions/notify-deploy@v1
        with:
          webhook-url: ${{ secrets.SLACK_DEPLOY_WEBHOOK }}
          status: ${{ job.status == 'success' && 'success' || 'failure' }}
          service: ${{ inputs.product }}-web
          environment: ${{ env.ENVIRONMENT }}
          version: ${{ env.ASSET_TAG }}
