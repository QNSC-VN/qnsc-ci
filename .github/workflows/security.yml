# =============================================================================
# Reusable Security suite — container CVE · SAST · secrets · dependencies
#
# Single source of truth for application security scanning across all QNSC
# products. Consuming repos call this via `workflow_call` and stay thin:
#
#   jobs:
#     security:
#       uses: QNSC-VN/qnsc-ci/.github/workflows/security.yml@v1
#       with:
#         product: rally
#       secrets: inherit
#
# All gates run on the FREE GitHub plan (no GitHub Advanced Security needed).
# Phased enforcement so the check can be marked required without day-1 debt
# walling off every PR:
#   • Trivy       — container image CVEs; CRITICAL BLOCKS (ships in the artifact)
#   • Gitleaks    — committed-secret scan; BLOCKS
#   • Semgrep     — SAST (replaces CodeQL); REPORT-ONLY (semgrep_blocking=true to enforce)
#   • osv-scanner — dependency CVEs (replaces dependency-review); REPORT-ONLY
#                   (osv_blocking=true to enforce)
# Triage the first-run Semgrep/osv findings, then flip the two blocking inputs.
#
# SARIF uploads to the GitHub Security tab remain `continue-on-error` — they
# are the only GHAS-gated pieces and no-op on the free plan without failing
# the run. They light up automatically after a plan upgrade, no rework.
# =============================================================================
name: Reusable · Security Scan

on:
  workflow_call:
    inputs:
      product:
        description: Product name, used for the scan image tag (e.g. rally, opshub).
        required: true
        type: string
      image_target:
        description: Dockerfile stage to build and scan for CVEs.
        required: false
        default: api
        type: string
      dockerfile_context:
        description: Docker build context path.
        required: false
        default: .
        type: string
      semgrep_config:
        description: >
          Space-separated Semgrep rulesets. Registry packs (p/*) are fetched
          free and require no login/token. Override per product if needed.
        required: false
        default: 'p/default p/typescript p/nodejs p/owasp-top-ten'
        type: string
      semgrep_version:
        description: Semgrep Docker image tag (semgrep/semgrep).
        required: false
        default: '1.97.0'
        type: string
      semgrep_blocking:
        description: >
          Fail the run on Semgrep findings. Phased rollout: start false
          (report-only), flip true after triaging first-run findings.
        required: false
        default: false
        type: boolean
      osv_blocking:
        description: >
          Fail the run on osv-scanner dependency findings. Phased rollout:
          start false (report-only), flip true after triaging.
        required: false
        default: false
        type: boolean
      osv_scanner_version:
        description: osv-scanner CLI version (without the "v" prefix, v1.x CLI).
        required: false
        default: '1.9.2'
        type: string
      node_version:
        description: Node version (only used if a lockfile refresh is needed).
        required: false
        default: '22'
        type: string
      scan_container:
        description: >
          Build and Trivy-scan a container image. Set false for Cloudflare-native
          / static apps that have no Dockerfile — Semgrep + Gitleaks + osv-scanner
          still run (they are source-based). Products leave this true.
        required: false
        default: true
        type: boolean

permissions:
  contents: read

jobs:
  # ───────────────────────────────────────────────────────────────────────
  # 1. Trivy — container image CVE scan. CRITICAL blocks; HIGH is reported.
  # ───────────────────────────────────────────────────────────────────────
  trivy:
    name: Container CVE scan (Trivy)
    if: ${{ inputs.scan_container }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      security-events: write
      packages: read # pull private @qnsc-vn/* from GitHub Packages during the image build
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Build image for scanning
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: ${{ inputs.dockerfile_context }}
          target: ${{ inputs.image_target }}
          push: false
          load: true
          tags: ${{ inputs.product }}-${{ inputs.image_target }}:scan
          cache-from: type=gha,scope=${{ inputs.image_target }}
          # Authenticates the Dockerfile's `pnpm install` against GitHub Packages
          # for private @qnsc-vn/* deps. Without this the cold build 401s and the
          # scan only passes on a warm layer cache (non-deterministic gate).
          secrets: |
            node_auth_token=${{ secrets.GITHUB_TOKEN }}

      # CRITICAL blocks the run. ignore-unfixed drops CVEs with no upstream fix.
      - name: Scan image (CRITICAL — blocks)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25  # v0.36.0
        with:
          image-ref: ${{ inputs.product }}-${{ inputs.image_target }}:scan
          format: table
          severity: CRITICAL
          exit-code: '1'
          ignore-unfixed: true

      - name: Scan image (HIGH — report only)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25  # v0.36.0
        with:
          image-ref: ${{ inputs.product }}-${{ inputs.image_target }}:scan
          format: sarif
          output: trivy-results.sarif
          severity: HIGH
          exit-code: '0'
          ignore-unfixed: true

      - name: Upload Trivy SARIF (GHAS UI — advisory on free plan)
        if: always()
        continue-on-error: true # requires GitHub Advanced Security (free plan: no-op)
        uses: github/codeql-action/upload-sarif@e4fba868fa4b1b91e1fdab776edc8cfbe6e9fb81  # v4
        with:
          sarif_file: trivy-results.sarif
          category: trivy-container

  # ───────────────────────────────────────────────────────────────────────
  # 2. Semgrep — SAST (OSS, free). Replaces CodeQL (which needs GHAS).
  #    Runs via the official Docker image (hermetic; avoids the pip/pkg_resources
  #    breakage under Python 3.12). Report-only by default (semgrep_blocking).
  # ───────────────────────────────────────────────────────────────────────
  semgrep:
    name: SAST (Semgrep)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      # Registry packs (p/*) fetched anonymously (no login/token); telemetry off.
      # --error (fail on findings) added only when semgrep_blocking=true.
      - name: Semgrep scan
        shell: bash
        env:
          SEMGREP_VERSION: ${{ inputs.semgrep_version }}
          SEMGREP_CONFIG: ${{ inputs.semgrep_config }}
          SEMGREP_BLOCKING: ${{ inputs.semgrep_blocking }}
        run: |
          set -euo pipefail
          CONFIG_ARGS=""
          for c in $SEMGREP_CONFIG; do CONFIG_ARGS="$CONFIG_ARGS --config=$c"; done
          ERROR_FLAG=""
          [ "${SEMGREP_BLOCKING}" = "true" ] && ERROR_FLAG="--error"
          # Intentional word-splitting below: CONFIG_ARGS/ERROR_FLAG accumulate
          # zero or more separate flags, so they must stay unquoted.
          # shellcheck disable=SC2086
          docker run --rm -v "$PWD:/src" -w /src -e SEMGREP_SEND_METRICS=off \
            "semgrep/semgrep:${SEMGREP_VERSION}" \
            semgrep scan $CONFIG_ARGS $ERROR_FLAG --sarif --output=semgrep.sarif .
          if [ "${SEMGREP_BLOCKING}" != "true" ]; then
            echo "::notice::Semgrep report-only (set semgrep_blocking=true to enforce)"
          fi

      - name: Upload Semgrep SARIF (GHAS UI — advisory on free plan)
        if: always()
        continue-on-error: true # requires GitHub Advanced Security (free plan: no-op)
        uses: github/codeql-action/upload-sarif@e4fba868fa4b1b91e1fdab776edc8cfbe6e9fb81  # v4
        with:
          sarif_file: semgrep.sarif
          category: semgrep-sast

  # ───────────────────────────────────────────────────────────────────────
  # 3. Gitleaks — committed-secret scan over full history (shared action).
  # ───────────────────────────────────────────────────────────────────────
  secrets:
    name: Secret scan (Gitleaks)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0

      - uses: QNSC-VN/qnsc-ci/actions/scan-secrets@v1
        with:
          fail-on-leak: 'true'

  # ───────────────────────────────────────────────────────────────────────
  # 4. osv-scanner — dependency CVE scan (OSS, free).
  #    Replaces actions/dependency-review-action (needs GHAS on private repos).
  # ───────────────────────────────────────────────────────────────────────
  dependencies:
    name: Dependency CVE scan (osv-scanner)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Install osv-scanner
        shell: bash
        env:
          OSV_VERSION: ${{ inputs.osv_scanner_version }}
        run: |
          set -euo pipefail
          curl -sSfL \
            "https://github.com/google/osv-scanner/releases/download/v${OSV_VERSION}/osv-scanner_linux_amd64" \
            -o /usr/local/bin/osv-scanner
          chmod +x /usr/local/bin/osv-scanner
          osv-scanner --version

      # Recursively finds every lockfile (root + apps/*) and scans it.
      # Report-only by default; set osv_blocking=true to fail on findings.
      - name: osv-scanner
        shell: bash
        env:
          OSV_BLOCKING: ${{ inputs.osv_blocking }}
        run: |
          set +e
          osv-scanner --recursive .
          code=$?
          set -e
          if [ "$code" -ne 0 ]; then
            if [ "${OSV_BLOCKING}" = "true" ]; then
              echo "::error::osv-scanner found vulnerable dependencies (blocking)"
              exit "$code"
            fi
            echo "::warning::osv-scanner found vulnerable dependencies (report-only; set osv_blocking=true to enforce)"
          fi
