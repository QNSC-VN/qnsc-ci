name: Reusables · Release & Tag Sync

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      major: ${{ steps.release.outputs.major }}
      minor: ${{ steps.release.outputs.minor }}
    steps:
      - id: release
        uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7  # v5.0.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          release-type: simple

  # Maintain floating major (vN) and minor (vN.M) tags so consumers can pin to
  # `@v1` and receive backward-compatible changes automatically — the standard
  # GitHub Actions versioning convention.
  #
  # Runs on EVERY push to main (not only on releases) so the floating major
  # never goes stale: a release-please release moves the tags to the new
  # version, and a non-releasable change (ci:/chore:/docs:) that still touches
  # action or reusable-workflow code refreshes the CURRENT major's tags to HEAD.
  # This closes the gap where a `ci:`-typed action change would otherwise not
  # reach `@vN` consumers because release-please only bumps on feat:/fix:.
  tag-sync:
    needs: release-please
    if: ${{ always() && needs.release-please.result == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7.0.1
        with:
          fetch-depth: 0

      - name: Move floating major/minor tags
        env:
          RELEASE_CREATED: ${{ needs.release-please.outputs.release_created }}
          MAJOR: ${{ needs.release-please.outputs.major }}
          MINOR: ${{ needs.release-please.outputs.minor }}
          BEFORE: ${{ github.event.before }}
        run: |
          set -euo pipefail
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          if [ "${RELEASE_CREATED}" = "true" ]; then
            # A new version was released — move that version's floating tags.
            TARGET_MAJOR="${MAJOR}"
            TARGET_MINOR="${MINOR}"
          else
            # No release cut (e.g. ci:/chore:/docs: commit). Only refresh the
            # floating tags when action or reusable-workflow CODE changed, so
            # `@vN` consumers don't go stale on otherwise-unreleased fixes.
            # Non-releasable commits are backward-compatible by convention;
            # breaking changes must use feat!/fix! which cut a new major first.
            if ! git diff --name-only "${BEFORE}" "${GITHUB_SHA}" 2>/dev/null \
                 | grep -qE '^(actions/|\.github/workflows/)'; then
              echo "No action/workflow code change and no release — nothing to sync."
              exit 0
            fi
            LATEST="$(git tag -l 'v[0-9]*.[0-9]*.[0-9]*' | sort -V | tail -n1)"
            if [ -z "${LATEST}" ]; then
              echo "No semver release tag exists yet — nothing to sync."
              exit 0
            fi
            VER="${LATEST#v}"
            TARGET_MAJOR="${VER%%.*}"
            TARGET_MINOR="$(printf '%s' "${VER}" | cut -d. -f2)"
            echo "No release on this push; refreshing floating tags for current major v${TARGET_MAJOR} (latest release ${LATEST})."
          fi

          for TAG in "v${TARGET_MAJOR}" "v${TARGET_MAJOR}.${TARGET_MINOR}"; do
            echo "Pointing ${TAG} at ${GITHUB_SHA}"
            git tag -f "${TAG}" "${GITHUB_SHA}"
            git push -f origin "refs/tags/${TAG}"
          done
