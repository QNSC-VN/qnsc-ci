name: Release Please

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      major: ${{ steps.release.outputs.major }}
      minor: ${{ steps.release.outputs.minor }}
    steps:
      - id: release
        uses: googleapis/release-please-action@a02a34c4d625b9a4a861ef97c6a31b01d782dc4f  # v4.2.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          release-type: simple

  # Maintain floating major (vN) and minor (vN.M) tags so consumers can pin to
  # `@v1` and receive backward-compatible bugfixes automatically — the standard
  # GitHub Actions versioning convention.
  tag-major:
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Move floating major/minor tags
        env:
          MAJOR: ${{ needs.release-please.outputs.major }}
          MINOR: ${{ needs.release-please.outputs.minor }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          for TAG in "v${MAJOR}" "v${MAJOR}.${MINOR}"; do
            echo "Pointing $TAG at $GITHUB_SHA"
            git tag -f "$TAG" "$GITHUB_SHA"
            git push -f origin "refs/tags/$TAG"
          done
