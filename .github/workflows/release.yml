name: Release Please

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@a02a34c4d625b9a4a861ef97c6a31b01d782dc4f  # v4.2.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          release-type: simple
