# =============================================================================
# Reusable PR Labeler — applies area/* labels from the caller's changed files.
#
# Caller:
#   jobs:
#     labeler:
#       uses: QNSC-VN/qnsc-ci/.github/workflows/labeler.yml@v1
#
# The label map (.github/labeler.yml) stays PRODUCT-LOCAL — it references
# each repo's own paths. This workflow only provides the shared plumbing.
# =============================================================================
name: Reusable PR Labeler

on:
  workflow_call:
    inputs:
      configuration_path:
        description: Path to the labeler config in the caller repo.
        required: false
        default: .github/labeler.yml
        type: string
      sync_labels:
        description: Remove labels no longer matching when files change.
        required: false
        default: true
        type: boolean

permissions:
  contents: read
  pull-requests: write

jobs:
  labeler:
    name: Label PR
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      # TODO(pin-policy): SHA-pin + Renovate.
      - uses: actions/labeler@v6
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          configuration-path: ${{ inputs.configuration_path }}
          sync-labels: ${{ inputs.sync_labels }}
