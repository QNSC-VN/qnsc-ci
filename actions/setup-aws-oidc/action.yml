name: Setup AWS OIDC Credentials
description: >
  Configure AWS credentials via GitHub OIDC (no long-lived keys stored anywhere)
  and optionally log in to Amazon ECR.

  This standardizes the OIDC auth pattern used across all rally repos so the
  role ARN convention, session duration, and ECR login step are managed in one
  place. Callers never need to reference `aws-actions/*` directly.

  Prerequisites:
  - The OIDC trust relationship must be provisioned in rally-infra
    (modules/github-oidc). Each environment has a separate IAM role with
    least-privilege policies scoped to that env.
  - GitHub Actions must be allowed to assume the role from the calling repo/branch.

inputs:
  role-arn:
    description: >
      IAM role ARN to assume via OIDC.
      Convention: `arn:aws:iam::<ACCOUNT>:role/rally-<env>-github-<scope>`
      e.g. `arn:aws:iam::123456789012:role/rally-develop-github-deploy`
    required: true
  region:
    description: AWS region
    required: true
  ecr-login:
    description: >
      Also authenticate to Amazon ECR and output the registry URL.
      Set to 'true' for any job that builds or pulls container images.
    required: false
    default: 'false'
  session-duration:
    description: Duration of the assumed-role session in seconds (max 3600 per OIDC)
    required: false
    default: '3600'
  mask-aws-account-id:
    description: >
      Mask the AWS account ID in logs.
      Set to 'false' during debugging only — always true in CI.
    required: false
    default: 'true'

outputs:
  ecr-registry:
    description: >
      ECR registry URL: `<account>.dkr.ecr.<region>.amazonaws.com`
      Populated only when `ecr-login: 'true'`.
    value: ${{ steps.ecr-login.outputs.registry }}
  aws-account-id:
    description: The AWS account ID of the assumed role
    value: ${{ steps.creds.outputs.aws-account-id }}

runs:
  using: composite
  steps:
    - name: Configure AWS credentials (OIDC)
      id: creds
      uses: aws-actions/configure-aws-credentials@v4  # v4
      with:
        role-to-assume: ${{ inputs.role-arn }}
        aws-region: ${{ inputs.region }}
        role-duration-seconds: ${{ inputs.session-duration }}
        mask-aws-account-id: ${{ inputs.mask-aws-account-id }}

    - name: Login to Amazon ECR
      id: ecr-login
      if: inputs.ecr-login == 'true'
      uses: aws-actions/amazon-ecr-login@062b18b96a7aff071d4dc91bc00c4c1a7945b076  # v2.0.1
      with:
        mask-password: 'true'
