name: Setup OpenTofu + AWS OIDC
description: >
  Install OpenTofu and authenticate to AWS via GitHub OIDC.
  Use this in any job that runs `tofu init / plan / apply`.

inputs:
  role-arn:
    description: IAM role ARN to assume via OIDC (e.g. arn:aws:iam::123456789012:role/my-role).
    required: true
  aws-region:
    description: AWS region.
    required: false
    default: ap-southeast-1
  tofu-version:
    description: OpenTofu version to install.
    required: false
    default: "1.9.1"

runs:
  using: composite
  steps:
    - uses: opentofu/setup-opentofu@e95ccdd20623115bfd7d47df14a3250d6066a9d0   # v1.0.7
      with:
        tofu_version: ${{ inputs.tofu-version }}
        # Install the REAL tofu binary, not the default wrapper. The wrapper
        # captures stdout/stderr/exit-code as step outputs and makes `tofu`
        # itself exit 0, which silently breaks `-detailed-exitcode`,
        # `$?` and `${PIPESTATUS[0]}` (apply-gating / plan error detection).
        tofu_wrapper: false

    - uses: aws-actions/configure-aws-credentials@ececac1a45f3b08a01d2dd070d28d111c5fe6722   # v4.1.0
      with:
        role-to-assume: ${{ inputs.role-arn }}
        aws-region:     ${{ inputs.aws-region }}
