name: Setup OpenTofu + AWS OIDC
description: >
  Install OpenTofu and authenticate to AWS via GitHub OIDC.
  Use this in any job that runs `tofu init / plan / apply`.

inputs:
  role-arn:
    description: IAM role ARN to assume via OIDC (e.g. arn:aws:iam::123456789012:role/my-role).
    required: true
  aws-region:
    description: AWS region.
    required: false
    default: ap-southeast-1
  tofu-version:
    description: OpenTofu version to install.
    required: false
    default: "1.9.1"

runs:
  using: composite
  steps:
    - uses: opentofu/setup-opentofu@909f0081d9d7379c18f3cb2c598fca1c21d5b7c0   # v1.0.5
      with:
        tofu_version: ${{ inputs.tofu-version }}

    - uses: aws-actions/configure-aws-credentials@ececac1a45f3b08a01d0407291516679297d9126   # v4.0.3
      with:
        role-to-assume: ${{ inputs.role-arn }}
        aws-region:     ${{ inputs.aws-region }}
