name: Verify ECS Deployment
description: >
  Poll an ECS service until its running task reaches the expected image tag,
  or until the timeout is exceeded.
  Caller must have already configured AWS credentials for the target environment.

inputs:
  cluster:
    description: ECS cluster name
    required: true
  service:
    description: ECS service name
    required: true
  image-tag:
    description: Expected image tag that should be running after deployment
    required: true
  region:
    description: AWS region
    required: true
  timeout-seconds:
    description: Maximum seconds to wait before failing
    required: false
    default: '600'
  poll-interval-seconds:
    description: Seconds between each poll
    required: false
    default: '15'

runs:
  using: composite
  steps:
    - name: Wait for ECS service to stabilize
      shell: bash
      run: |
        CLUSTER="${{ inputs.cluster }}"
        SERVICE="${{ inputs.service }}"
        REGION="${{ inputs.region }}"
        TAG="${{ inputs.image-tag }}"
        TIMEOUT="${{ inputs.timeout-seconds }}"
        INTERVAL="${{ inputs.poll-interval-seconds }}"
        ELAPSED=0

        echo "Waiting for $SERVICE in $CLUSTER to run image tag: $TAG"
        echo "Timeout: ${TIMEOUT}s  Poll interval: ${INTERVAL}s"

        while [ "$ELAPSED" -lt "$TIMEOUT" ]; do
          TASK_ARNS=$(aws ecs list-tasks \
            --cluster "$CLUSTER" \
            --service-name "$SERVICE" \
            --region "$REGION" \
            --query 'taskArns' \
            --output text 2>/dev/null || echo "")

          if [ -z "$TASK_ARNS" ]; then
            RUNNING_IMAGES=""
          else
            # shellcheck disable=SC2086 — intentional word-split to pass multiple ARNs
            RUNNING_IMAGES=$(aws ecs describe-tasks \
              --cluster "$CLUSTER" \
              --tasks $TASK_ARNS \
              --region "$REGION" \
              --query 'tasks[].containers[].image' \
              --output text 2>/dev/null || echo "")
          fi

          # Split on whitespace so ":v1" never falsely matches ":v10" or ":v1-rc1".
          if echo "$RUNNING_IMAGES" | tr ' \t' '\n' | grep -qF ":${TAG}"; then
            echo "✓ Service $SERVICE is running image tag: $TAG"
            exit 0
          fi

          echo "  [${ELAPSED}s/${TIMEOUT}s] Still deploying… (images: $RUNNING_IMAGES)"
          sleep "$INTERVAL"
          ELAPSED=$(( ELAPSED + INTERVAL ))
        done

        echo "✗ Timed out after ${TIMEOUT}s waiting for $SERVICE to stabilize."
        exit 1
