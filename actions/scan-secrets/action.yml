name: Scan for Secrets
description: >
  Scan the repository for accidentally committed secrets using the Gitleaks
  CLI (installed directly from the official GitHub release, not the
  gitleaks/gitleaks-action wrapper — that wrapper's terms require a paid
  license for private-org usage; the CLI binary itself is MIT-licensed and
  free to run directly). Matches the exact invocation already proven in
  rally's backend-security.yml.

  Run on every push and PR. Gitleaks scans the full git history for secrets
  in commits — not just the current diff — so it catches rotated-but-not-revoked
  credentials in old commits. Caller's checkout step must use fetch-depth: 0
  for full-history scanning.

inputs:
  gitleaks-version:
    description: Gitleaks CLI version to install (without the "v" prefix).
    required: false
    default: '8.21.2'
  fail-on-leak:
    description: Exit 1 (fail the workflow) if any secrets are detected
    required: false
    default: 'true'

runs:
  using: composite
  steps:
    - name: Install Gitleaks
      shell: bash
      env:
        GITLEAKS_VERSION: ${{ inputs.gitleaks-version }}
      run: |
        curl -sSfL \
          "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
          | tar -xz -C /usr/local/bin gitleaks
        gitleaks version

    - name: Scan git history for secrets
      shell: bash
      run: |
        if [ "${{ inputs.fail-on-leak }}" = "false" ]; then
          gitleaks detect --source . --log-opts="--all" --no-banner --exit-code 0 \
            || echo "::notice ::Secret scan complete — failures will not block this run (fail-on-leak=false)"
        else
          gitleaks detect --source . --log-opts="--all" --no-banner --exit-code 1
        fi
