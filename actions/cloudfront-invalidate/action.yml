name: Invalidate CloudFront Cache
description: >
  Create a CloudFront invalidation for one or more paths and optionally wait
  for it to complete before returning.
  Caller must have already configured AWS credentials (OIDC or otherwise).

inputs:
  distribution-id:
    description: CloudFront distribution ID (e.g. E1ABCDEFGHIJKL)
    required: true
  paths:
    description: >
      Space-separated list of paths to invalidate.
      Use `/*` to invalidate everything. Use specific paths for targeted
      invalidations (cheaper — AWS charges per invalidation path after 1k/mo).
    required: false
    default: '/*'
  region:
    description: AWS region (CloudFront is global but the API call needs a region)
    required: false
    default: us-east-1
  wait:
    description: Wait for the invalidation to reach `Completed` state before returning
    required: false
    default: 'false'

outputs:
  invalidation-id:
    description: The CloudFront invalidation ID
    value: ${{ steps.invalidate.outputs.invalidation-id }}

runs:
  using: composite
  steps:
    - name: Create invalidation
      id: invalidate
      shell: bash
      run: |
        INVALIDATION_ID=$(aws cloudfront create-invalidation \
          --distribution-id "${{ inputs.distribution-id }}" \
          --paths ${{ inputs.paths }} \
          --region "${{ inputs.region }}" \
          --query 'Invalidation.Id' \
          --output text)

        echo "invalidation-id=$INVALIDATION_ID" >> "$GITHUB_OUTPUT"
        echo "✓ Invalidation created: $INVALIDATION_ID"

    - name: Wait for invalidation to complete
      if: inputs.wait == 'true'
      shell: bash
      run: |
        echo "Waiting for invalidation ${{ steps.invalidate.outputs.invalidation-id }} to complete..."
        aws cloudfront wait invalidation-completed \
          --distribution-id "${{ inputs.distribution-id }}" \
          --id "${{ steps.invalidate.outputs.invalidation-id }}" \
          --region "${{ inputs.region }}"
        echo "✓ Invalidation complete"
