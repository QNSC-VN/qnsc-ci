name: Validate OpenAPI Contract
description: >
  Detect breaking API changes between the current OpenAPI spec and a base spec
  (usually the spec on the target branch for PRs).

  Uses `oasdiff` — "OpenAPI diff" — to compare specs and flag backwards-
  incompatible changes (removed endpoints, renamed fields, type changes, etc.)
  before they reach production and break clients.

  Breaking changes at ERR severity fail this action by default.
  WARNING severity changes are printed but do not fail.

  In CI: download the base branch spec as an artifact from the previous build,
  then run this action against it before merging.

inputs:
  current-spec-path:
    description: >
      Path to the current OpenAPI spec (relative to workspace root).
      Typically generated by the `openapi` CI job and downloaded as an artifact.
    required: false
    default: openapi.json
  base-spec-path:
    description: >
      Path to the base (reference) OpenAPI spec to compare against.
      Download this from the `openapi` artifact on the base branch before calling
      this action.
    required: false
    default: base-openapi.json
  fail-on-breaking:
    description: Fail the action if ERR-level breaking changes are detected
    required: false
    default: 'true'
  oasdiff-version:
    description: oasdiff release tag to download (e.g. v1.22.0)
    required: false
    default: v1.22.0
  format:
    description: Output format — text or json
    required: false
    default: text

outputs:
  breaking-found:
    description: '"true" if breaking changes were detected'
    value: ${{ steps.diff.outputs.breaking-found }}

runs:
  using: composite
  steps:
    - name: Install oasdiff
      shell: bash
      run: |
        VERSION="${{ inputs.oasdiff-version }}"
        OS="linux"
        ARCH="amd64"
        BASE="https://github.com/Tufin/oasdiff/releases/download/${VERSION}"
        TARBALL="oasdiff_${VERSION#v}_${OS}_${ARCH}.tar.gz"
        echo "Downloading oasdiff ${VERSION}..."
        curl -sSL "${BASE}/${TARBALL}"          -o /tmp/oasdiff.tar.gz
        curl -sSL "${BASE}/checksums.txt"       -o /tmp/oasdiff-checksums.txt
        # Verify SHA-256 before extracting
        EXPECTED=$(grep "${TARBALL}" /tmp/oasdiff-checksums.txt | awk '{print $1}')
        ACTUAL=$(sha256sum /tmp/oasdiff.tar.gz | awk '{print $1}')
        if [ "$EXPECTED" != "$ACTUAL" ]; then
          echo "::error ::Checksum mismatch for ${TARBALL}: expected=${EXPECTED} got=${ACTUAL}"
          exit 1
        fi
        tar -xz -C /usr/local/bin -f /tmp/oasdiff.tar.gz oasdiff
        rm /tmp/oasdiff.tar.gz /tmp/oasdiff-checksums.txt
        oasdiff --version

    - name: Compare OpenAPI specs
      id: diff
      shell: bash
      run: |
        CURRENT="${{ inputs.current-spec-path }}"
        BASE="${{ inputs.base-spec-path }}"
        FORMAT="${{ inputs.format }}"

        if [ ! -f "$BASE" ]; then
          echo "::warning ::Base spec not found at '$BASE' — skipping contract validation."
          echo "breaking-found=false" >> "$GITHUB_OUTPUT"
          exit 0
        fi

        if [ ! -f "$CURRENT" ]; then
          echo "::error ::Current spec not found at '$CURRENT'"
          exit 1
        fi

        echo "Comparing:"
        echo "  base:    $BASE"
        echo "  current: $CURRENT"
        echo ""

        # Run oasdiff breaking — exits 1 if ERR-level breaking changes found
        BREAKING_OUTPUT=$(oasdiff breaking \
          --format "$FORMAT" \
          "$BASE" "$CURRENT" 2>&1) || BREAKING_EXIT=$?

        echo "$BREAKING_OUTPUT"

        if [ "${BREAKING_EXIT:-0}" -ne 0 ]; then
          echo ""
          echo "breaking-found=true" >> "$GITHUB_OUTPUT"
          if [ "${{ inputs.fail-on-breaking }}" = "true" ]; then
            echo "::error ::Breaking API changes detected. Review the diff above before merging."
            exit 1
          else
            echo "::warning ::Breaking API changes detected (fail-on-breaking=false — not blocking)."
          fi
        else
          echo "✓ No breaking changes detected"
          echo "breaking-found=false" >> "$GITHUB_OUTPUT"
        fi
