name: Run Database Migration
description: >
  Run Drizzle database migrations as a gated ECS run-task.

  This is the "third motion" described in ARCHITECTURE_CURRENT.md:
    1. Provision   (rally-infra, OpenTofu)
    2. Migrate     (this action — MUST run before new app version goes live)
    3. Deploy      (aws ecs update-service with new image tag)

  The action fails fast if migrations fail, blocking the deploy job from
  proceeding. Never run migrations and flip traffic in the same atomic step.

  Caller must have AWS credentials configured with ECS + ECR permissions.
  The migrator ECS task definition must already exist (provisioned by rally-infra).

inputs:
  cluster:
    description: ECS cluster name
    required: true
  task-definition:
    description: Migrator ECS task definition name (e.g. rally-develop-migrator)
    required: true
  container-name:
    description: Container name inside the migrator task definition
    required: false
    default: migrator
  subnet-ids:
    description: >
      Comma-separated list of private subnet IDs for the migration task.
      Must have outbound connectivity to RDS (same VPC, correct security groups).
    required: true
  security-group-ids:
    description: >
      Comma-separated security group IDs.
      Must allow outbound to RDS port 5432.
    required: true
  region:
    description: AWS region
    required: true
  environment:
    description: Environment label for log messages (e.g. develop, production)
    required: false
    default: unknown
  timeout-seconds:
    description: Maximum seconds to wait for the migration task to complete
    required: false
    default: '600'

outputs:
  task-arn:
    description: ARN of the migration task that ran
    value: ${{ steps.migrate.outputs.task-arn }}

runs:
  using: composite
  steps:
    - name: Run migration task
      id: migrate
      uses: nghiavan0610/qncs-gitops/actions/ecs-run-task@947bc9bd8e130065082f9a2e15e4f61cfbb736ca
      with:
        cluster: ${{ inputs.cluster }}
        task-definition: ${{ inputs.task-definition }}
        container-name: ${{ inputs.container-name }}
        subnet-ids: ${{ inputs.subnet-ids }}
        security-group-ids: ${{ inputs.security-group-ids }}
        region: ${{ inputs.region }}
        timeout-seconds: ${{ inputs.timeout-seconds }}

    - name: Confirm migration success
      shell: bash
      run: |
        echo "✓ Migrations applied on ${{ inputs.environment }} (task: ${{ steps.migrate.outputs.task-arn }})"
        echo "  Deploy can now proceed safely."
